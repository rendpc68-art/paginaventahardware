<section class="contact-container">

  <h1>Contacto</h1>

  <p class="intro">
    ¿Tienes dudas sobre algún componente o necesitas asesoría para armar tu PC?
    Escríbenos y te ayudaremos.
  </p>


  <div class="contact-info">

    <div>
      <h3>📍 Dirección</h3>
      <p>Av. Principal TechStore, Ecuador</p>
    </div>

    <div>
      <h3>📞 Teléfono</h3>
      <p>+593 999 999 999</p>
    </div>

    <div>
      <h3>✉️ Correo</h3>
      <p>contacto@techstore.com</p>
    </div>

  </div>


  <form class="contact-form">

    <label>
      Nombre:
    </label>

    <input 
      type="text"
      placeholder="Ingrese su nombre">


    <label>
      Correo:
    </label>

    <input 
      type="email"
      placeholder="Ingrese su correo">


    <label>
      Mensaje:
    </label>

    <textarea 
      rows="5"
      placeholder="Escriba su mensaje">
    </textarea>


    <button type="submit">
      Enviar mensaje
    </button>

  </form>


</section>
